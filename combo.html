<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>組合圖形推算</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }

    .nav { display: flex; justify-content: space-between; align-items: center;
           padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .nav a { font-size: 14px; color: #666; text-decoration: none; }
    .nav h2 { font-size: 16px; color: #333; font-weight: bold; }

    .progress-wrap { background: #dde3ff; height: 8px; }
    .progress-bar { height: 8px; background: #4a6cf7; transition: width 0.4s; width: 0%; }
    .progress-text { text-align: center; font-size: 13px; color: #666; padding: 6px 0 0; }

    .main { display: flex; flex-direction: column; align-items: center;
            padding: 12px; gap: 12px; max-width: 720px; margin: 0 auto; }
    @media (min-width: 600px) {
      .main { flex-direction: row; align-items: flex-start; padding: 20px; gap: 24px; }
    }

    .canvas-wrap { background: #fff; border-radius: 16px; padding: 12px;
                   box-shadow: 0 2px 10px rgba(74,108,247,0.12); flex-shrink: 0; }
    canvas { display: block; }

    .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .question-card { background: #fff; border-radius: 16px; padding: 16px 20px;
                     box-shadow: 0 2px 10px rgba(74,108,247,0.12); }
    .q-given { font-size: 15px; color: #555; margin-bottom: 8px; line-height: 1.6; }
    .q-ask { font-size: 22px; font-weight: bold; color: #4a6cf7; }
    .input-display { margin-top: 12px; background: #f4f6ff; border: 2.5px solid #c0ccff;
                     border-radius: 10px; padding: 10px 16px; font-size: 36px; font-weight: bold;
                     color: #333; text-align: center; min-height: 64px; }
    .input-display.wrong { border-color: #ff6b6b; color: #ff6b6b; animation: shake 0.35s; }
    .input-display.correct { border-color: #51cf66; color: #2f9e44; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .key { background: #fff; border: 2px solid #dde3ff; border-radius: 12px;
           font-size: 26px; font-weight: bold; color: #333; padding: 14px 0;
           cursor: pointer; text-align: center; user-select: none;
           transition: background 0.1s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .key:active { background: #e8ecff; transform: scale(0.95); }
    .key.del { font-size: 20px; color: #999; }
    .key.ok { background: #4a6cf7; color: #fff; border-color: #4a6cf7; font-size: 18px; }
    .key.ok:active { background: #3a5ce7; }

    .result-card { background: #edfff5; border: 2px solid #51cf66; border-radius: 16px;
                   padding: 16px 20px; display: none; }
    .result-card.show { display: block; }
    .result-text { font-size: 18px; color: #2f9e44; font-weight: bold;
                   margin-bottom: 12px; line-height: 1.6; }
    .next-btn { background: #51cf66; color: #fff; border: none; border-radius: 12px;
                font-size: 20px; font-weight: bold; padding: 14px; width: 100%; cursor: pointer; }
    .next-btn:active { background: #40c057; }

    .score-screen { display: none; flex-direction: column; align-items: center;
                    background: #fff; border-radius: 20px; padding: 32px 24px;
                    box-shadow: 0 4px 20px rgba(74,108,247,0.15); width: 100%; text-align: center; }
    .score-screen.show { display: flex; }
    .score-emoji { font-size: 72px; margin-bottom: 8px; }
    .score-num { font-size: 56px; font-weight: bold; color: #4a6cf7; }
    .score-sub { font-size: 16px; color: #888; margin-top: 4px; }
    .restart-btn { background: #4a6cf7; color: #fff; border: none; border-radius: 14px;
                   font-size: 20px; font-weight: bold; padding: 16px 40px; cursor: pointer; margin-top: 24px; }
    .restart-btn:active { background: #3a5ce7; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="measure.html">← 換算練習</a>
    <h2>組合圖形推算</h2>
    <div style="display:flex;gap:8px">
      <a href="index.html">圓的秘密 →</a>
      <a href="map.html">量路 →</a>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText">第 1 題 / 共 6 題</div>

  <div class="main" id="main">
    <div class="canvas-wrap">
      <canvas id="cvs" width="270" height="240"></canvas>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="question-card">
        <div class="q-given" id="qGiven"></div>
        <div class="q-ask" id="qAsk"></div>
        <div class="input-display" id="inputDisplay">_</div>
      </div>

      <div class="keypad" id="keypad">
        <div class="key" data-k="7">7</div>
        <div class="key" data-k="8">8</div>
        <div class="key" data-k="9">9</div>
        <div class="key" data-k="4">4</div>
        <div class="key" data-k="5">5</div>
        <div class="key" data-k="6">6</div>
        <div class="key" data-k="1">1</div>
        <div class="key" data-k="2">2</div>
        <div class="key" data-k="3">3</div>
        <div class="key del" data-k="del">⌫</div>
        <div class="key" data-k="0">0</div>
        <div class="key ok" data-k="ok">確認</div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-text" id="resultText"></div>
        <button class="next-btn" id="nextBtn">下一題 →</button>
      </div>
    </div>

    <div class="score-screen" id="scoreScreen">
      <div class="score-emoji">🎉</div>
      <div style="font-size:26px;font-weight:bold;color:#333;margin-bottom:4px">完成！</div>
      <div class="score-num" id="scoreNum">6</div>
      <div class="score-sub">答對 / 共 6 題</div>
      <button class="restart-btn" onclick="restart()">再練一次</button>
    </div>
  </div>

  <script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const W = cvs.width, H = cvs.height;

    // ── Drawing helpers ───────────────────────────────────────────
    function clr() { ctx.clearRect(0, 0, W, H); }

    function circ(x, y, r, color, lw) {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = color; ctx.lineWidth = lw || 3; ctx.stroke();
    }

    function dot(x, y, r, color) {
      ctx.beginPath(); ctx.arc(x, y, r || 5, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
    }

    function seg(x1, y1, x2, y2, color, lw) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.strokeStyle = color; ctx.lineWidth = lw || 2; ctx.stroke();
    }

    function txt(s, x, y, color, size, align) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + (size || 14) + 'px sans-serif';
      ctx.textAlign = align || 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(s, x, y);
    }

    function measureBracket(x1, x2, y, color, label) {
      seg(x1, y, x2, y, color, 2);
      seg(x1, y - 5, x1, y + 5, color, 2);
      seg(x2, y - 5, x2, y + 5, color, 2);
      txt(label, (x1 + x2) / 2, y - 13, color, 15);
    }

    function easeOut(t) { return 1 - Math.pow(1 - Math.min(1, t), 2); }

    // ── Scene definitions ─────────────────────────────────────────
    // draw(t): t < 0 = idle, t 0..1 = reveal animation

    const SCENES = [

      // 1. Two equal circles r=3, find total width
      {
        given: '每個圓的半徑是 3 公分',
        question: '兩個圓排在一起，總長是幾公分？',
        answer: 12,
        hint: '直徑 6 + 直徑 6\n= 12 公分',
        draw(t) {
          const rPx = 52, c1x = 67, c2x = 67 + 2 * rPx, cy = 108;
          clr();
          circ(c1x, cy, rPx, '#4a6cf7', 3);
          circ(c2x, cy, rPx, '#4a6cf7', 3);
          dot(c1x, cy, 5, '#4a6cf7');
          dot(c2x, cy, 5, '#4a6cf7');
          seg(c1x, cy, c1x, cy - rPx, '#ff922b', 2.5);
          seg(c2x, cy, c2x, cy - rPx, '#ff922b', 2.5);
          dot(c1x, cy - rPx, 4, '#ff922b');
          dot(c2x, cy - rPx, 4, '#ff922b');
          txt('半徑 3', c1x, cy - rPx - 12, '#ff922b', 13);
          txt('半徑 3', c2x, cy - rPx - 12, '#ff922b', 13);

          const lY = cy + rPx + 20, x1 = c1x - rPx, x2 = c2x + rPx;
          if (t < 0) {
            measureBracket(x1, x2, lY, '#bbb', '？公分');
          } else {
            measureBracket(x1, x2, lY, '#51cf66', '12 公分');
            if (t > 0.4) {
              ctx.globalAlpha = easeOut((t - 0.4) / 0.5);
              seg(c1x - rPx, cy, c1x + rPx, cy, '#e06b00', 4);
              seg(c2x - rPx, cy, c2x + rPx, cy, '#1a8a3a', 4);
              txt('直徑 6', c1x, cy + 18, '#e06b00', 13);
              txt('直徑 6', c2x, cy + 18, '#1a8a3a', 13);
              ctx.globalAlpha = 1;
            }
          }
        }
      },

      // 2. Circle r=4 inside square, find side length
      {
        given: '圓的半徑是 4 公分，圓剛好裝進正方形裡',
        question: '正方形一條邊長是幾公分？',
        answer: 8,
        hint: '一條邊 = 直徑 = 半徑 × 2\n= 4 × 2 = 8 公分',
        draw(t) {
          const rPx = 70, cx = 135, cy = 115;
          clr();
          // Square — highlight bottom edge
          const sq = rPx;
          ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2;
          ctx.strokeRect(cx - sq, cy - sq, sq * 2, sq * 2);
          // Bottom edge highlighted in question colour
          const edgeColor = t < 0 ? '#9b59b6' : '#51cf66';
          seg(cx - rPx, cy + rPx, cx + rPx, cy + rPx, edgeColor, 4);
          // Circle
          circ(cx, cy, rPx, '#4a6cf7', 3);
          dot(cx, cy, 5, '#4a6cf7');
          // Radius line
          seg(cx, cy, cx + rPx, cy, '#ff922b', 2.5);
          dot(cx + rPx, cy, 4, '#ff922b');
          txt('半徑 4', cx + rPx / 2, cy - 14, '#ff922b', 13);

          // Bottom edge bracket
          const bY = cy + rPx + 18;
          if (t < 0) {
            measureBracket(cx - rPx, cx + rPx, bY, '#9b59b6', '一條邊 ＝ ？公分');
          } else {
            measureBracket(cx - rPx, cx + rPx, bY, '#51cf66', '一條邊 ＝ 8 公分');
            if (t > 0.4) {
              ctx.globalAlpha = easeOut((t - 0.4) / 0.5);
              // Full diameter highlighted
              seg(cx - rPx, cy, cx + rPx, cy, '#e06b00', 4);
              dot(cx - rPx, cy, 4, '#e06b00');
              txt('直徑 8', cx, cy + 18, '#e06b00', 14);
              ctx.globalAlpha = 1;
            }
          }
        }
      },

      // 3. Two different circles r=2, r=5, find total
      {
        given: '左圓半徑 2 公分，右圓半徑 5 公分',
        question: '兩個圓排在一起，總長是幾公分？',
        answer: 14,
        hint: '直徑 4 + 直徑 10\n= 14 公分',
        draw(t) {
          const r1 = 34, r2 = 80, c1x = 40, c2x = 40 + r1 + r2, cy = 118;
          clr();
          circ(c1x, cy, r1, '#4a6cf7', 3);
          circ(c2x, cy, r2, '#4a6cf7', 3);
          dot(c1x, cy, 5, '#4a6cf7');
          dot(c2x, cy, 5, '#4a6cf7');
          seg(c1x, cy, c1x, cy - r1, '#ff922b', 2.5);
          seg(c2x, cy, c2x, cy - r2, '#ff922b', 2.5);
          dot(c1x, cy - r1, 4, '#ff922b');
          dot(c2x, cy - r2, 4, '#ff922b');
          txt('半徑 2', c1x, cy - r1 - 12, '#ff922b', 12);
          txt('半徑 5', c2x, cy - r2 - 12, '#ff922b', 13);

          const lY = cy + r2 + 18, x1 = c1x - r1, x2 = c2x + r2;
          if (t < 0) {
            measureBracket(x1, x2, lY, '#bbb', '？公分');
          } else {
            measureBracket(x1, x2, lY, '#51cf66', '14 公分');
            if (t > 0.4) {
              ctx.globalAlpha = easeOut((t - 0.4) / 0.5);
              seg(c1x - r1, cy, c1x + r1, cy, '#e06b00', 4);
              seg(c2x - r2, cy, c2x + r2, cy, '#1a8a3a', 4);
              txt('直徑 4', c1x, cy + 16, '#e06b00', 12);
              txt('直徑 10', c2x, cy + 16, '#1a8a3a', 14);
              ctx.globalAlpha = 1;
            }
          }
        }
      },

      // 4. Three equal circles d=6 in a row, find total
      {
        given: '每個圓的直徑是 6 公分',
        question: '三個圓排成一排，總長是幾公分？',
        answer: 18,
        hint: '6 + 6 + 6 = 18 公分',
        draw(t) {
          const rPx = 40, c1x = 45, c2x = 125, c3x = 205, cy = 108;
          clr();
          [c1x, c2x, c3x].forEach(cx => {
            circ(cx, cy, rPx, '#4a6cf7', 3);
            dot(cx, cy, 5, '#4a6cf7');
            seg(cx - rPx, cy, cx + rPx, cy, '#ff922b', 2);
            dot(cx - rPx, cy, 3, '#ff922b');
            dot(cx + rPx, cy, 3, '#ff922b');
          });
          txt('直徑 6', c1x, cy - rPx - 12, '#ff922b', 12);
          txt('直徑 6', c2x, cy - rPx - 12, '#ff922b', 12);
          txt('直徑 6', c3x, cy - rPx - 12, '#ff922b', 12);

          const lY = cy + rPx + 20, x1 = c1x - rPx, x2 = c3x + rPx;
          if (t < 0) {
            measureBracket(x1, x2, lY, '#bbb', '？公分');
          } else {
            measureBracket(x1, x2, lY, '#51cf66', '18 公分');
            if (t > 0.4) {
              ctx.globalAlpha = easeOut((t - 0.4) / 0.5);
              const cols = ['#e06b00', '#1a6ab8', '#1a8a3a'];
              [c1x, c2x, c3x].forEach((cx, i) => {
                seg(cx - rPx, cy, cx + rPx, cy, cols[i], 4);
                txt('6', cx, cy + 16, cols[i], 14);
              });
              ctx.globalAlpha = 1;
            }
          }
        }
      },

      // 5. Two equal circles, total = 20, find each radius
      {
        given: '兩個相同的圓排在一起，\n總長是 20 公分',
        question: '每個圓的半徑是幾公分？',
        answer: 5,
        hint: '20 ÷ 2 = 10（直徑）\n直徑 10 ÷ 2 = 半徑 5 公分',
        draw(t) {
          const rPx = 58, c1x = 68, c2x = 68 + 2 * rPx, cy = 108;
          clr();
          circ(c1x, cy, rPx, '#4a6cf7', 3);
          circ(c2x, cy, rPx, '#4a6cf7', 3);
          dot(c1x, cy, 5, '#4a6cf7');
          dot(c2x, cy, 5, '#4a6cf7');

          const lY = cy + rPx + 18, x1 = c1x - rPx, x2 = c2x + rPx;
          measureBracket(x1, x2, lY, '#ff922b', '20 公分');

          if (t < 0) {
            txt('？', c1x, cy - rPx - 12, '#aaa', 20);
            txt('？', c2x, cy - rPx - 12, '#aaa', 20);
          } else {
            if (t > 0.3) {
              ctx.globalAlpha = easeOut((t - 0.3) / 0.4);
              // Show diameter lines
              seg(c1x - rPx, cy, c1x + rPx, cy, '#e06b00', 4);
              seg(c2x - rPx, cy, c2x + rPx, cy, '#e06b00', 4);
              txt('直徑 10', c1x, cy + 18, '#e06b00', 13);
              txt('直徑 10', c2x, cy + 18, '#e06b00', 13);
              ctx.globalAlpha = 1;
            }
            if (t > 0.65) {
              ctx.globalAlpha = easeOut((t - 0.65) / 0.35);
              // Show radius
              seg(c1x, cy, c1x, cy - rPx, '#1a8a3a', 3);
              seg(c2x, cy, c2x, cy - rPx, '#1a8a3a', 3);
              dot(c1x, cy - rPx, 4, '#1a8a3a');
              dot(c2x, cy - rPx, 4, '#1a8a3a');
              txt('半徑 5', c1x, cy - rPx - 12, '#1a8a3a', 13);
              txt('半徑 5', c2x, cy - rPx - 12, '#1a8a3a', 13);
              ctx.globalAlpha = 1;
            }
          }
        }
      },

      // 6. Large circle r=8, two small circles inside each r=4
      {
        given: '大圓半徑 8 公分，\n兩個相同小圓剛好並排裝入大圓',
        question: '每個小圓的半徑是幾公分？',
        answer: 4,
        hint: '兩個小圓直徑 = 大圓直徑 = 16\n小圓直徑 = 8，半徑 = 4 公分',
        draw(t) {
          const bigR = 90, cx = 135, cy = 118;
          const smR = bigR / 2, sm1x = cx - smR, sm2x = cx + smR;
          clr();
          // Large circle
          circ(cx, cy, bigR, '#4a6cf7', 3);
          dot(cx, cy, 5, '#4a6cf7');
          // Large radius
          seg(cx, cy, cx, cy - bigR, '#ff922b', 2.5);
          dot(cx, cy - bigR, 4, '#ff922b');
          txt('半徑 8', cx + 22, cy - bigR / 2, '#ff922b', 13);
          // Small circles
          circ(sm1x, cy, smR, '#7c3aed', 2.5);
          circ(sm2x, cy, smR, '#7c3aed', 2.5);
          dot(sm1x, cy, 4, '#7c3aed');
          dot(sm2x, cy, 4, '#7c3aed');

          if (t < 0) {
            txt('半徑？', sm1x, cy + smR + 14, '#aaa', 13);
            txt('半徑？', sm2x, cy + smR + 14, '#aaa', 13);
          } else {
            if (t > 0.3) {
              ctx.globalAlpha = easeOut((t - 0.3) / 0.4);
              seg(sm1x, cy, sm1x, cy - smR, '#1a8a3a', 3);
              seg(sm2x, cy, sm2x, cy - smR, '#1a8a3a', 3);
              dot(sm1x, cy - smR, 4, '#1a8a3a');
              dot(sm2x, cy - smR, 4, '#1a8a3a');
              txt('半徑 4', sm1x, cy + smR + 14, '#1a8a3a', 13);
              txt('半徑 4', sm2x, cy + smR + 14, '#1a8a3a', 13);
              ctx.globalAlpha = 1;
            }
            if (t > 0.65) {
              ctx.globalAlpha = easeOut((t - 0.65) / 0.35);
              // Show that large radius = small diameter
              seg(cx - smR, cy + 14, cx + smR, cy + 14, '#e06b00', 3);
              seg(cx - smR, cy + 9, cx - smR, cy + 19, '#e06b00', 2);
              seg(cx + smR, cy + 9, cx + smR, cy + 19, '#e06b00', 2);
              txt('直徑 8 = 大圓半徑 8', cx, cy + 28, '#e06b00', 12);
              ctx.globalAlpha = 1;
            }
          }
        }
      }
    ];

    // ── State ─────────────────────────────────────────────────────
    let si = 0, score = 0, input = '';
    let animating = false, rafId = null, animStart = 0;
    const ANIM_DUR = 1600;

    // ── Animation loop ────────────────────────────────────────────
    function startAnim() {
      animating = true;
      animStart = performance.now();
      rafId = requestAnimationFrame(function tick(ts) {
        const t = Math.min(1, (ts - animStart) / ANIM_DUR);
        SCENES[si].draw(t);
        if (t < 1) rafId = requestAnimationFrame(tick);
        else animating = false;
      });
    }

    // ── Input handling ────────────────────────────────────────────
    function handleKey(k) {
      if (animating) return;
      if (document.getElementById('resultCard').classList.contains('show')) return;

      if (k === 'del') {
        input = input.slice(0, -1);
      } else if (k === 'ok') {
        submit(); return;
      } else {
        if (input.length >= 3) return;
        input += k;
      }
      const d = document.getElementById('inputDisplay');
      d.textContent = input || '_';
      d.className = 'input-display';
    }

    function submit() {
      if (!input) return;
      const scene = SCENES[si];
      const val = parseInt(input, 10);
      const d = document.getElementById('inputDisplay');

      if (val === scene.answer) {
        score++;
        d.className = 'input-display correct';
        d.textContent = val + ' ✓';
        document.getElementById('keypad').style.display = 'none';
        startAnim();
        setTimeout(() => {
          const rt = document.getElementById('resultText');
          rt.innerHTML = '✓ &nbsp;' + scene.hint.replace('\n', '<br>');
          document.getElementById('resultCard').classList.add('show');
        }, ANIM_DUR - 400);
      } else {
        d.className = 'input-display wrong';
        input = '';
        setTimeout(() => { d.textContent = '_'; d.className = 'input-display'; }, 600);
      }
    }

    // ── Navigation ────────────────────────────────────────────────
    document.getElementById('keypad').addEventListener('click', e => {
      const el = e.target.closest('[data-k]');
      if (el) handleKey(el.dataset.k);
    });

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') handleKey(e.key);
      else if (e.key === 'Backspace') handleKey('del');
      else if (e.key === 'Enter') handleKey('ok');
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      si++;
      if (si >= SCENES.length) showScore();
      else loadScene();
    });

    // ── Load scene ────────────────────────────────────────────────
    function loadScene() {
      if (rafId) cancelAnimationFrame(rafId);
      animating = false;
      input = '';
      const scene = SCENES[si];
      document.getElementById('qGiven').innerHTML = scene.given.replace('\n', '<br>');
      document.getElementById('qAsk').textContent = scene.question;
      document.getElementById('inputDisplay').textContent = '_';
      document.getElementById('inputDisplay').className = 'input-display';
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('keypad').style.display = 'grid';
      document.getElementById('progressBar').style.width = (si / SCENES.length * 100) + '%';
      document.getElementById('progressText').textContent = '第 ' + (si + 1) + ' 題 / 共 ' + SCENES.length + ' 題';
      scene.draw(-1);
    }

    function showScore() {
      if (rafId) cancelAnimationFrame(rafId);
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = '完成！';
      document.getElementById('rightPanel').style.display = 'none';
      document.getElementById('scoreScreen').classList.add('show');
      document.getElementById('scoreNum').textContent = score;
      clr();
      ctx.font = '90px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(score >= 5 ? '🏆' : score >= 3 ? '🌟' : '💪', W / 2, H / 2);
    }

    function restart() {
      si = 0; score = 0;
      document.getElementById('scoreScreen').classList.remove('show');
      document.getElementById('rightPanel').style.display = '';
      loadScene();
    }

    loadScene();
  </script>
</body>
</html>
