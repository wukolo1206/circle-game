<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>半徑與直徑換算練習</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }

    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
    }
    .nav a { font-size: 14px; color: #666; text-decoration: none; }
    .nav h2 { font-size: 16px; color: #333; font-weight: bold; }

    .progress-wrap { background: #dde3ff; height: 8px; }
    .progress-bar { height: 8px; background: #4a6cf7; transition: width 0.4s; width: 0%; }

    .progress-text {
      text-align: center; font-size: 13px; color: #666;
      padding: 6px 0 0;
    }

    .main {
      display: flex; flex-direction: column; align-items: center;
      padding: 12px; gap: 12px; max-width: 720px; margin: 0 auto;
    }
    @media (min-width: 600px) {
      .main { flex-direction: row; align-items: flex-start; padding: 20px; gap: 24px; }
    }

    .canvas-wrap {
      background: #fff; border-radius: 16px; padding: 12px;
      box-shadow: 0 2px 10px rgba(74,108,247,0.12); flex-shrink: 0;
    }
    canvas { display: block; }

    .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .question-card {
      background: #fff; border-radius: 16px; padding: 16px 20px;
      box-shadow: 0 2px 10px rgba(74,108,247,0.12);
    }
    .q-known { font-size: 16px; color: #888; margin-bottom: 4px; }
    .q-ask { font-size: 22px; font-weight: bold; color: #4a6cf7; }

    .input-display {
      margin-top: 12px; background: #f4f6ff;
      border: 2.5px solid #c0ccff; border-radius: 10px;
      padding: 10px 16px; font-size: 36px; font-weight: bold;
      color: #333; text-align: center; min-height: 64px;
      letter-spacing: 2px;
    }
    .input-display.wrong { border-color: #ff6b6b; color: #ff6b6b; animation: shake 0.35s; }
    .input-display.correct { border-color: #51cf66; color: #2f9e44; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .key {
      background: #fff; border: 2px solid #dde3ff; border-radius: 12px;
      font-size: 26px; font-weight: bold; color: #333;
      padding: 14px 0; cursor: pointer; text-align: center;
      user-select: none; transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .key:active { background: #e8ecff; transform: scale(0.95); }
    .key.del { font-size: 20px; color: #999; }
    .key.ok { background: #4a6cf7; color: #fff; border-color: #4a6cf7; font-size: 18px; }
    .key.ok:active { background: #3a5ce7; }

    .result-card {
      background: #edfff5; border: 2px solid #51cf66; border-radius: 16px;
      padding: 16px 20px; display: none;
    }
    .result-card.show { display: block; }
    .result-text { font-size: 18px; color: #2f9e44; font-weight: bold; margin-bottom: 12px; }
    .next-btn {
      background: #51cf66; color: #fff; border: none; border-radius: 12px;
      font-size: 20px; font-weight: bold; padding: 14px; width: 100%; cursor: pointer;
    }
    .next-btn:active { background: #40c057; }

    .score-screen {
      display: none; flex-direction: column; align-items: center;
      background: #fff; border-radius: 20px; padding: 32px 24px;
      box-shadow: 0 4px 20px rgba(74,108,247,0.15); width: 100%; text-align: center;
    }
    .score-screen.show { display: flex; }
    .score-emoji { font-size: 72px; margin-bottom: 8px; }
    .score-title { font-size: 26px; font-weight: bold; color: #333; margin-bottom: 4px; }
    .score-num { font-size: 64px; font-weight: bold; color: #4a6cf7; line-height: 1.1; }
    .score-sub { font-size: 16px; color: #888; margin-top: 4px; }
    .restart-btn {
      background: #4a6cf7; color: #fff; border: none; border-radius: 14px;
      font-size: 20px; font-weight: bold; padding: 16px 40px; cursor: pointer; margin-top: 24px;
    }
    .restart-btn:active { background: #3a5ce7; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">← 圓的秘密</a>
    <h2>半徑與直徑換算</h2>
    <a href="draw.html">圓規練習 →</a>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText">第 1 題 / 共 10 題</div>

  <div class="main" id="main">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="cvs" width="260" height="260"></canvas>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="question-card">
        <div class="q-known" id="qKnown">已知：</div>
        <div class="q-ask" id="qAsk">？</div>
        <div class="input-display" id="inputDisplay">_</div>
      </div>

      <div class="keypad" id="keypad">
        <div class="key" data-k="7">7</div>
        <div class="key" data-k="8">8</div>
        <div class="key" data-k="9">9</div>
        <div class="key" data-k="4">4</div>
        <div class="key" data-k="5">5</div>
        <div class="key" data-k="6">6</div>
        <div class="key" data-k="1">1</div>
        <div class="key" data-k="2">2</div>
        <div class="key" data-k="3">3</div>
        <div class="key del" data-k="del">⌫</div>
        <div class="key" data-k="0">0</div>
        <div class="key ok" data-k="ok">確認</div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-text" id="resultText"></div>
        <button class="next-btn" id="nextBtn">下一題 →</button>
      </div>
    </div>

    <div class="score-screen" id="scoreScreen">
      <div class="score-emoji">🎉</div>
      <div class="score-title">完成！</div>
      <div class="score-num" id="scoreNum">10</div>
      <div class="score-sub">答對 / 共 10 題</div>
      <button class="restart-btn" onclick="restart()">再練一次</button>
    </div>
  </div>

  <script>
    // ── Question bank ──────────────────────────────────────────────
    const ALL_Q = [];
    [6, 8, 10, 12, 14, 16, 18, 20, 24].forEach(d =>
      ALL_Q.push({ type: 'r_from_d', r: d / 2, d, answer: d / 2 })
    );
    [3, 4, 5, 6, 7, 8, 9, 10, 12].forEach(r =>
      ALL_Q.push({ type: 'd_from_r', r, d: r * 2, answer: r * 2 })
    );

    function shuffle(a) {
      const b = [...a];
      for (let i = b.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [b[i], b[j]] = [b[j], b[i]];
      }
      return b;
    }

    // ── State ──────────────────────────────────────────────────────
    let questions = [], qi = 0, score = 0, input = '';
    let animating = false, rafId = null;

    // ── Canvas setup ───────────────────────────────────────────────
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const W = cvs.width, H = cvs.height;
    const CX = W / 2, CY = H / 2;
    const R_PX = 100; // circle always drawn at this pixel radius

    // ── Drawing helpers ────────────────────────────────────────────
    function clearCanvas() { ctx.clearRect(0, 0, W, H); }

    function drawCircle() {
      ctx.beginPath();
      ctx.arc(CX, CY, R_PX, 0, Math.PI * 2);
      ctx.strokeStyle = '#4a6cf7';
      ctx.lineWidth = 3;
      ctx.stroke();
      // center dot
      ctx.beginPath();
      ctx.arc(CX, CY, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#4a6cf7';
      ctx.fill();
    }

    function drawSegment(x1, y1, x2, y2, color, lw) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      ctx.stroke();
    }

    function drawDot(x, y, r, color) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function label(text, x, y, color, size) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + (size || 15) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, x, y);
    }

    function easeOut(t) { return 1 - Math.pow(1 - t, 2); }

    // ── Idle drawing (question state) ──────────────────────────────
    function drawIdle(q) {
      clearCanvas();
      drawCircle();
      if (q.type === 'r_from_d') {
        // horizontal diameter line
        drawSegment(CX - R_PX, CY, CX + R_PX, CY, '#ff922b', 4);
        drawDot(CX - R_PX, CY, 5, '#ff922b');
        drawDot(CX + R_PX, CY, 5, '#ff922b');
        label('直徑 ' + q.d + ' 公分', CX, CY - 18, '#ff922b', 16);
      } else {
        // radius line (center → right)
        drawSegment(CX, CY, CX + R_PX, CY, '#ff922b', 4);
        drawDot(CX + R_PX, CY, 5, '#ff922b');
        label('半徑 ' + q.r + ' 公分', CX + R_PX / 2, CY - 18, '#ff922b', 16);
      }
      // question mark at unknown
      if (q.type === 'r_from_d') {
        label('？', CX + R_PX / 2, CY + 22, '#aaa', 14);
      } else {
        label('？', CX - R_PX / 2, CY + 22, '#aaa', 14);
        label('？', CX + R_PX + 16, CY, '#aaa', 14);
      }
    }

    // ── Animated drawing (after correct answer) ────────────────────
    function drawAnim(q, t) {
      clearCanvas();
      drawCircle();

      if (q.type === 'r_from_d') {
        // Phase 1 (t<0.35): orange diameter highlighted
        // Phase 2 (t≥0.35): split into orange left + green right, labels appear
        if (t < 0.35) {
          drawSegment(CX - R_PX, CY, CX + R_PX, CY, '#ff922b', 5);
          drawDot(CX - R_PX, CY, 5, '#ff922b');
          drawDot(CX + R_PX, CY, 5, '#ff922b');
          label('直徑 ' + q.d + ' 公分', CX, CY - 18, '#ff922b', 16);
        } else {
          const p = easeOut((t - 0.35) / 0.35);
          // left half: orange
          drawSegment(CX - R_PX, CY, CX, CY, '#ff922b', 5);
          drawDot(CX - R_PX, CY, 5, '#ff922b');
          // right half: grow green
          drawSegment(CX, CY, CX + R_PX, CY, '#51cf66', 5);
          drawDot(CX + R_PX, CY, 5, '#51cf66');
          // midpoint emphasis
          drawDot(CX, CY, 4 + 4 * p, '#333');

          if (t > 0.6) {
            const fade = Math.min(1, (t - 0.6) / 0.4);
            ctx.globalAlpha = fade;
            label('半徑 ' + q.r + ' 公分', CX - R_PX / 2, CY - 20, '#ff922b', 15);
            label('半徑 ' + q.r + ' 公分', CX + R_PX / 2, CY - 20, '#51cf66', 15);
          }
          if (t > 0.75) {
            const fade = Math.min(1, (t - 0.75) / 0.25);
            ctx.globalAlpha = fade;
            label('直徑 ' + q.d + ' ÷ 2 = 半徑 ' + q.r, CX, CY + R_PX + 26, '#333', 16);
          }
          ctx.globalAlpha = 1;
        }

      } else {
        // d_from_r: known right radius, grow left arm
        // Phase 1 (t<0.5): left arm extends
        // Phase 2 (t≥0.5): labels, brace, formula
        drawSegment(CX, CY, CX + R_PX, CY, '#ff922b', 5);
        drawDot(CX + R_PX, CY, 5, '#ff922b');

        const leftP = Math.min(1, easeOut(t / 0.5));
        const leftX = CX - R_PX * leftP;
        drawSegment(CX, CY, leftX, CY, '#51cf66', 5);
        if (leftP > 0.95) drawDot(CX - R_PX, CY, 5, '#51cf66');

        if (t > 0.45) {
          const fade = Math.min(1, (t - 0.45) / 0.3);
          ctx.globalAlpha = fade;
          label('半徑 ' + q.r + ' 公分', CX + R_PX / 2, CY - 20, '#ff922b', 15);
          label('半徑 ' + q.r + ' 公分', CX - R_PX / 2, CY - 20, '#51cf66', 15);
        }
        if (t > 0.72) {
          const fade = Math.min(1, (t - 0.72) / 0.28);
          ctx.globalAlpha = fade;
          // brace on top
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(CX - R_PX, CY - 8);
          ctx.lineTo(CX - R_PX, CY - R_PX - 10);
          ctx.lineTo(CX + R_PX, CY - R_PX - 10);
          ctx.lineTo(CX + R_PX, CY - 8);
          ctx.stroke();
          label('直徑 ' + q.d + ' 公分', CX, CY - R_PX - 26, '#333', 16);
          label('半徑 ' + q.r + ' × 2 = 直徑 ' + q.d, CX, CY + R_PX + 26, '#333', 16);
        }
        ctx.globalAlpha = 1;
      }
    }

    // ── Animation loop ─────────────────────────────────────────────
    const ANIM_DUR = 1500;
    let animStart = 0;

    function startAnim() {
      animating = true;
      animStart = performance.now();
      rafId = requestAnimationFrame(tick);
    }

    function tick(ts) {
      const t = Math.min(1, (ts - animStart) / ANIM_DUR);
      drawAnim(questions[qi], t);
      if (t < 1) {
        rafId = requestAnimationFrame(tick);
      } else {
        animating = false;
      }
    }

    // ── Input handling ─────────────────────────────────────────────
    function handleKey(k) {
      if (animating) return;
      const rc = document.getElementById('resultCard');
      if (rc.classList.contains('show')) return;

      if (k === 'del') {
        input = input.slice(0, -1);
      } else if (k === 'ok') {
        submit();
        return;
      } else {
        if (input.length >= 3) return;
        input += k;
      }
      const disp = document.getElementById('inputDisplay');
      disp.textContent = input || '_';
      disp.className = 'input-display';
    }

    function submit() {
      if (input === '') return;
      const q = questions[qi];
      const val = parseInt(input, 10);
      const disp = document.getElementById('inputDisplay');

      if (val === q.answer) {
        score++;
        disp.className = 'input-display correct';
        disp.textContent = val + ' ✓';
        document.getElementById('keypad').style.display = 'none';

        startAnim();

        const delay = ANIM_DUR - 300;
        setTimeout(() => {
          const rc = document.getElementById('resultCard');
          const rt = document.getElementById('resultText');
          if (q.type === 'r_from_d') {
            rt.textContent = '✓  直徑 ' + q.d + ' ÷ 2 = 半徑 ' + q.r + ' 公分';
          } else {
            rt.textContent = '✓  半徑 ' + q.r + ' × 2 = 直徑 ' + q.d + ' 公分';
          }
          rc.classList.add('show');
        }, delay);
      } else {
        disp.className = 'input-display wrong';
        input = '';
        setTimeout(() => {
          disp.textContent = '_';
          disp.className = 'input-display';
        }, 600);
      }
    }

    // ── Navigation ─────────────────────────────────────────────────
    document.getElementById('keypad').addEventListener('click', e => {
      const el = e.target.closest('[data-k]');
      if (el) handleKey(el.dataset.k);
    });

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') handleKey(e.key);
      else if (e.key === 'Backspace') handleKey('del');
      else if (e.key === 'Enter') handleKey('ok');
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      qi++;
      if (qi >= 10) showScore();
      else loadQuestion();
    });

    // ── Load question ──────────────────────────────────────────────
    function loadQuestion() {
      if (rafId) cancelAnimationFrame(rafId);
      animating = false;
      input = '';

      const q = questions[qi];
      document.getElementById('qKnown').textContent =
        '已知：' + (q.type === 'r_from_d' ? '直徑 ' + q.d + ' 公分' : '半徑 ' + q.r + ' 公分');
      document.getElementById('qAsk').textContent =
        q.type === 'r_from_d' ? '半徑是幾公分？' : '直徑是幾公分？';
      document.getElementById('inputDisplay').textContent = '_';
      document.getElementById('inputDisplay').className = 'input-display';
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('keypad').style.display = 'grid';
      document.getElementById('progressBar').style.width = (qi / 10 * 100) + '%';
      document.getElementById('progressText').textContent = '第 ' + (qi + 1) + ' 題 / 共 10 題';

      drawIdle(q);
    }

    // ── Score screen ───────────────────────────────────────────────
    function showScore() {
      if (rafId) cancelAnimationFrame(rafId);
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = '完成！';
      document.getElementById('rightPanel').style.display = 'none';

      const ss = document.getElementById('scoreScreen');
      ss.classList.add('show');
      document.getElementById('scoreNum').textContent = score;

      // Trophy on canvas
      clearCanvas();
      ctx.font = '90px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(score >= 9 ? '🏆' : score >= 7 ? '🌟' : '💪', CX, CY);
    }

    // ── Start / restart ────────────────────────────────────────────
    function restart() {
      questions = shuffle(ALL_Q).slice(0, 10);
      qi = 0;
      score = 0;
      document.getElementById('scoreScreen').classList.remove('show');
      document.getElementById('rightPanel').style.display = '';
      loadQuestion();
    }

    restart();
  </script>
</body>
</html>
